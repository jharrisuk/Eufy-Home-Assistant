# Build the add-on from Home Assistant's Debian (bookworm) base images.
# Debian (NOT Alpine) is deliberate: aiortc/av/pycryptodome pull in PyAV, which links against
# the system FFmpeg libraries and is published as manylinux wheels (glibc). On Alpine (musl)
# those wheels do not install and PyAV must compile against musl FFmpeg, which is fragile.
# Debian gives us glibc + prebuilt wheels for aarch64/amd64, so the install is reliable.
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base-debian:bookworm
  amd64: ghcr.io/home-assistant/amd64-base-debian:bookworm
args:
  GO2RTC_VERSION: "v1.9.9"
labels:
  org.opencontainers.image.title: "Eufy NVR Local"
  org.opencontainers.image.description: "Local eufy S4/T8N00 WebRTC -> RTSP bridge for Home Assistant"
  org.opencontainers.image.source: https://github.com/HallyAus/Eufy-Home-Assistant
  org.opencontainers.image.licenses: MIT
